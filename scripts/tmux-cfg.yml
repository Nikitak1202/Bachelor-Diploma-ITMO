session_name: apartment_sim
windows:
  - window_name: control
    panes:
      - shell_command: bash

  # - window_name: rviz
  #   panes:
  #     - shell_command: |
  #         bash -c "
  #           echo '=== Starting Rviz2 ==='
  #           source /ros2_ws/install/setup.bash
            
  #           sleep 10   # Wait for robot and sensors
  #           rviz2 2>&1 | tee -a '/ros2_ws/logs/rviz.log'
  #         "

  - window_name: gazebo
    panes:
      - shell_command: |
          bash -c "
            echo '=== Starting Gazebo ==='
            source /ros2_ws/install/setup.bash

            export DISPLAY=:99
            mkdir -p /tmp/.X11-unix
            Xvfb :99 -screen 0 1920x1080x24 -nolisten tcp > /ros2_ws/logs/xvfb.log 2>&1 &
            
            sleep 1
            x11vnc -display :99 -rfbport 5900 -nopw -localhost > /ros2_ws/logs/x11vnc.log 2>&1 &
            
            sleep 1
            websockify --web=/usr/share/novnc/ 0.0.0.0:6080 localhost:5900 > /ros2_ws/logs/websockify.log 2>&1 &
            
            sleep 1
            ros2 launch gazebo_ros gazebo.launch.py world:=/worlds/apartment.world 2>&1 | tee -a '/ros2_ws/logs/gazebo.log'&
            GAZEBOPID=\$!

            # Wait for Gazebo window (search by class or title)
            sleep 8
            export DISPLAY=:99
            # Try to maximize Gazebo window
            xdotool search --onlyvisible --class 'gazebo' windowactivate --sync
            xdotool search --onlyvisible --class 'gazebo' windowsize %@ 1920 1080
            xdotool search --onlyvisible --class 'gazebo' windowmove %@ 0 0

            wait \$GAZEBOPID
          "

  - window_name: obstacles
    panes:
      - shell_command: |
          bash -c "
            echo '=== Starting Obstacles Controller ==='
            source /ros2_ws/install/setup.bash

            sleep 5
            ros2 run apartment_sim obstacles_controller 2>&1 | tee -a '/ros2_ws/logs/obstacles.log'
          "

  - window_name: robot_spawn
    panes:
      - shell_command: |
          bash -c "
            echo '=== Spawning Omnidirectional Robot ==='
            source /ros2_ws/install/setup.bash

            sleep 8
            ros2 launch omni_robot spawn_robot.launch.py spawn_x:=2.0 spawn_y:=2.0 2>&1 | tee -a '/ros2_ws/logs/robot_spawn.log'
          "

  - window_name: robot_control
    panes:
      - shell_command: |
          bash -c "
            echo '=== Starting Robot Controller (dummy) ==='
            source /ros2_ws/install/setup.bash

            sleep 9
            /ros2_ws/install/omni_robot/bin/dummy_controller 2>&1 | tee -a '/ros2_ws/logs/robot_control.log'
          "
