session_name: apartment_sim
windows:
  - window_name: control
    panes:
      - shell_command: bash

  - window_name: gazebo
    panes:
      - shell_command: |
          bash -c "
            echo '=== Starting Gazebo ==='
            source /ros2_ws/install/setup.bash

            export DISPLAY=:99
            mkdir -p /tmp/.X11-unix
            Xvfb :99 -screen 0 1920x1080x24 -nolisten tcp > /ros2_ws/logs/xvfb.log 2>&1 &
            
            sleep 1
            x11vnc -display :99 -rfbport 5900 -nopw -localhost > /ros2_ws/logs/x11vnc.log 2>&1 &
            
            sleep 1
            websockify --web=/usr/share/novnc/ 0.0.0.0:6080 localhost:5900 > /ros2_ws/logs/websockify.log 2>&1 &
            
            sleep 1
            ros2 launch gazebo_ros gazebo.launch.py world:=/worlds/apartment.world 2>&1 | tee -a '/ros2_ws/logs/gazebo.log'&
            GAZEBOPID=\$!

            # Wait for Gazebo window and maximize it
            sleep 8
            xdotool search --onlyvisible --class 'gazebo' windowactivate --sync
            xdotool search --onlyvisible --class 'gazebo' windowsize %@ 1500 800
            xdotool search --onlyvisible --class 'gazebo' windowmove %@ 0 0

            wait \$GAZEBOPID
          "

  - window_name: rviz
    panes:
      - shell_command: |
          bash -c "
            echo '=== Starting Rviz2 ==='
            source /ros2_ws/install/setup.bash

            RVIZ_DISPLAY=:100
            RVIZ_VNC_PORT=5901
            RVIZ_WEB_PORT=8080
            SCREEN_RESOLUTION=\${SCREEN_RESOLUTION:-1500x800}
            SCREEN_DEPTH=24

            export DISPLAY=\$RVIZ_DISPLAY
            mkdir -p /tmp/.X11-unix
            Xvfb \$RVIZ_DISPLAY -screen 0 \${SCREEN_RESOLUTION}x\${SCREEN_DEPTH} -nolisten tcp > /ros2_ws/logs/xvfb_rviz.log 2>&1 &

            sleep 1
            x11vnc -display \$RVIZ_DISPLAY -rfbport \$RVIZ_VNC_PORT -nopw -localhost > /ros2_ws/logs/x11vnc_rviz.log 2>&1 &

            sleep 1
            websockify --web=/usr/share/novnc/ 0.0.0.0:\$RVIZ_WEB_PORT localhost:\$RVIZ_VNC_PORT > /ros2_ws/logs/websockify_rviz.log 2>&1 &

            sleep 7 
            rviz2 -d /ros2_ws/src/omni_robot/config/layout.rviz 2>&1 | tee -a '/ros2_ws/logs/rviz.log' &
            RVIZPID=\$!

            # Wait for Rviz window and maximize it
            sleep 5
            xdotool search --onlyvisible --class 'rviz2' windowactivate --sync
            xdotool search --onlyvisible --class 'rviz2' windowsize %@ 1500 800
            xdotool search --onlyvisible --class 'rviz2' windowmove %@ 0 0

            wait \$RVIZPID
          "

  - window_name: obstacles
    panes:
      - shell_command: |
          bash -c "
            echo '=== Starting Obstacles Controller ==='
            source /ros2_ws/install/setup.bash

            sleep 5
            ros2 run apartment_sim obstacles_controller 2>&1 | tee -a '/ros2_ws/logs/obstacles.log'
          "

  - window_name: robot_spawn
    panes:
      - shell_command: |
          bash -c "
            echo '=== Spawning Omnidirectional Robot ==='
            source /ros2_ws/install/setup.bash

            sleep 8
            ros2 launch omni_robot spawn_robot.launch.py 2>&1 | tee -a '/ros2_ws/logs/robot_spawn.log'
          "

  - window_name: robot_control
    panes:
      - shell_command: |
          bash -c "
            echo '=== Nav2 (A*) + MPPI + SLAM + target chase pipeline ==='
            source /ros2_ws/install/setup.bash

            sleep 14
            ros2 launch omni_robot omni_nav2.launch.py use_composition:=False 2>&1 | tee -a '/ros2_ws/logs/nav2.log'
          "
